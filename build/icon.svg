<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Forensic Archivist">
  <!-- Navy rounded-square badge: "Forensic Archivist" brand primary -->
  <rect width="256" height="256" rx="56" fill="#002045"/>

  <!-- Inner folder/ledger (white, slight translucency so edges feel layered) -->
  <!-- Folder tab -->
  <path d="M56 74 Q56 60 70 60 L108 60 Q116 60 122 66 L130 74 L188 74 Q200 74 200 86 L200 94 L56 94 Z"
        fill="#ffffff"/>
  <!-- Folder body -->
  <rect x="56" y="88" width="144" height="128" rx="10" fill="#ffffff"/>

  <!-- Ledger rows on folder body (slate-200) -->
  <g fill="#cbd5e1">
    <rect x="76" y="114" width="104" height="6" rx="2"/>
    <rect x="76" y="134" width="104" height="6" rx="2"/>
    <rect x="76" y="154" width="104" height="6" rx="2"/>
    <rect x="76" y="174" width="64" height="6" rx="2"/>
  </g>

  <!-- Emerald accent dots on two rows (subtle "flagged" markers) -->
  <g fill="#10b981">
    <rect x="170" y="112" width="10" height="10" rx="2"/>
    <rect x="170" y="132" width="10" height="10" rx="2"/>
  </g>

  <!-- Magnifying glass (forensic lens) -->
  <g transform="translate(188, 188)">
    <!-- Dark inner pad behind lens so rim reads clearly at small sizes -->
    <circle cx="0" cy="0" r="30" fill="#002045"/>
    <!-- Lens rim -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#10b981" stroke-width="7"/>
    <!-- Lens highlight -->
    <circle cx="-7" cy="-7" r="4" fill="#a7f3d0" opacity="0.9"/>
    <!-- Handle -->
    <line x1="16" y1="16" x2="34" y2="34" stroke="#10b981" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
